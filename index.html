      <script>
      const GEMINI_API_KEY = 'AIzaSyBRkf5aYqmCXu4oCELAUBUpJU77yqyrSV4';    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const messagesDiv = document.getElementById('chat-messages');
      const msg = input.value.trim();
      if (!msg) return;
      const userDiv = document.createElement('div');
      userDiv.style.cssText = 'background:#00d4ff;color:#000;padding:8px 12px;border-radius:6px;align-self:flex-end;max-width:80%;word-wrap:break-word;';

      messagesDiv.appendChild(userDiv);
      input.value = '';

      loadDiv.textContent = 'Thinking...';
      messagesDiv.appendChild(loadDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}`, {          headers: {'Content-Type': 'application/json'},

          body: JSON.stringify({contents: [{parts: [{text: msg}]}]})
        });
        const data = await res.json();
         if (data.error) { const reply = data.error.message || JSON.stringify(data.error); loadDiv.textContent = 'API Error: ' + reply; loadDiv.style.color = '#ff6b6b'; } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Error: No response';
        loadDiv.textContent = reply;
        loadDiv.style.color = '#e0e0e0';
            }
      } catch (e) {
